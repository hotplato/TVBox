<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>TVBox 远程控制</title><link rel="stylesheet" href="/remote.css"></head><body><main><header><div><p class="eyebrow">TVBOX REMOTE</p><h1>远程控制</h1></div><span id="badge" class="badge">未配对</span></header><section id="pair-card" class="card hero"><h2>连接电视</h2><p>在电视的“远程控制”页查看 6 位配对码。</p><form id="pair-form"><input id="code" inputmode="numeric" maxlength="6" placeholder="输入 6 位配对码"><button>开始配对</button></form></section><div id="console" hidden><nav class="tabs"><button class="tab active" data-tab="config">配置</button><button class="tab" data-tab="search">搜索</button><button class="tab" data-tab="play">快播</button><button class="tab" data-tab="controls">遥控</button></nav><section id="tab-config" class="card panel active"><h2>配置与应用设置</h2><p>保存后，配置地址变更会立即重新加载电视首页。</p><form id="config-form"><input id="config-url" type="url" placeholder="https://example.com/config.json"><div class="setting-grid"><label><input id="debug-open" type="checkbox"> 调试日志</label><label><input id="parse-webview" type="checkbox"> 系统 WebView</label><label>播放器<select id="play-type"><option value="2">Media3</option><option value="0">系统播放器</option></select></label><label>渲染<select id="play-render"><option value="0">纹理</option><option value="1">Surface</option></select></label><label>缩放<select id="play-scale"><option value="0">默认</option><option value="1">16:9</option><option value="2">4:3</option><option value="3">填满</option><option value="4">原始</option><option value="5">裁剪</option></select></label><label>首页推荐<select id="home-rec"><option value="0">豆瓣热播</option><option value="1">数据源推荐</option><option value="2">历史</option></select></label><label>搜索展示<select id="search-view"><option value="0">列表</option><option value="1">缩略图</option></select></label><label>DoH 索引<input id="doh-url" type="number" min="0" step="1"></label></div><button>保存设置</button></form></section><section id="tab-search" class="card panel"><h2>电视搜索</h2><form id="search-form"><input id="search-word" placeholder="输入影片或节目名称"><button>搜索</button></form></section><section id="tab-play" class="card panel"><h2>快速播放</h2><p>支持直链、网页解析及设备支持时的磁力链接。</p><form id="play-form"><input id="play-title" placeholder="标题（可选）"><input id="play-url" placeholder="播放地址"><button>在电视上播放</button></form></section><section id="tab-controls" class="card panel controls"><div class="row"><h2>播放控制</h2><span id="state" class="muted">未连接播放器</span></div><div class="dpad" aria-label="方向遥控"><button data-action="key_up" class="up">↑</button><button data-action="key_left" class="left">←</button><button data-action="key_enter" class="enter">确认</button><button data-action="key_right" class="right">→</button><button data-action="key_down" class="down">↓</button></div><button class="back-key" data-action="key_back">返回</button><div class="progress"><input id="seek" type="range" min="0" max="0" value="0"><span id="time">0:00 / 0:00</span></div><div class="buttons"><button data-action="seek_relative" data-value="-10">−10 秒</button><button data-action="play">播放</button><button data-action="pause">暂停</button><button data-action="stop" class="danger">停止</button><button data-action="seek_relative" data-value="10">+10 秒</button></div><div class="buttons"><button data-action="volume" data-value="-1">音量 −</button><button data-action="volume" data-value="1">音量 +</button><button data-action="speed" data-value="0.5">0.5×</button><button data-action="speed" data-value="1">1×</button><button data-action="speed" data-value="1.5">1.5×</button><button data-action="speed" data-value="2">2×</button></div></section></div><p id="notice" role="status"></p></main><script src="/remote.js"></script></body></html>
