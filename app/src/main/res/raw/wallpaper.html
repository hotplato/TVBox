<!doctype html><html lang="zh-CN"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TVBox 壁纸</title><style>body{font-family:system-ui;background:#101626;color:#fff;max-width:640px;margin:32px auto;padding:16px}button,input{padding:12px;margin:6px 0;border-radius:8px}button{background:#5865f2;color:#fff;border:0}section{background:#1c2740;padding:20px;border-radius:14px}#msg{color:#9ff0c0}</style><section><h1>壁纸设置</h1><p id="state">读取中…</p><button onclick="provider('wallhaven')">Wallhaven 随机</button><button onclick="provider('bing')">Bing 每日</button><button onclick="refresh()">更新当前服务</button><form onsubmit="upload(event)"><input id="file" type="file" accept="image/jpeg,image/png,image/webp"><button>上传并应用</button></form><button onclick="resetWallpaper()">恢复默认</button><p id="msg"></p></section><script>const t=sessionStorage.getItem('tvbox-token')||'';async function api(p,o={}){o.headers={...(o.headers||{}),Authorization:'Bearer '+t};const r=await fetch(p,o),d=await r.json();if(!r.ok)throw Error(d.message||'请求失败');return d}async function load(){try{const d=await api('/api/v1/wallpaper');state.textContent='当前来源：'+d.source;msg.textContent=''}catch(e){msg.textContent=e.message}}async function run(f){try{const d=await f();msg.textContent=d.message||'已完成';load()}catch(e){msg.textContent=e.message}}function provider(p){run(()=>api('/api/v1/wallpaper',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider:p})}))}function refresh(){run(()=>api('/api/v1/wallpaper/refresh',{method:'POST'}))}function upload(e){e.preventDefault();const f=file.files[0];if(!f)return;const b=new FormData;b.append('file',f);run(()=>api('/api/v1/wallpaper/upload',{method:'POST',body:b}))}function resetWallpaper(){run(()=>api('/api/v1/wallpaper',{method:'DELETE'}))}const state=document.querySelector('#state'),msg=document.querySelector('#msg');load()</script>
